version: 2

project_name: gctl

builds:
  - id: gctl
    binary: gctl
    main: .
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
  - id: gctl-ro
    binary: gctl-ro
    main: ./cmd/gctl-ro
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: gctl
    ids: [gctl]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE.txt, README.md]
  - id: gctl-ro
    ids: [gctl-ro]
    name_template: "{{ .ProjectName }}_readonly_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE.txt, README.md]

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  ## Disabled for the initial public release: with no prior tag, the changelog
  ## would dump the entire commit history. Flip back to false after v0.1.0 so
  ## later releases get a clean tag-to-tag diff.
  disable: true
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
    - title: Other changes
      order: 999
  filters:
    exclude: ['^docs', '^chore', '^test', '^ci', '^style', '^refactor']

release:
  header: |
    ## gctl {{ .Tag }}

    gctl is the Gravitee CLI for APIM & AM.
  footer: |
    ## Variants

    This release ships two binaries:

    | Binary | Use case | Commands |
    |--------|----------|----------|
    | `gctl` | Humans, scripts, CI | Full CRUD - get, list, create, update, delete |
    | `gctl-ro` | AI agents, read-only automation | Get and list only - no write operations |

    Both binaries read the same config file (`~/.gctl/config.yaml`) and share the same flags and output formats. Install them side by side: agents use `gctl-ro`, you use `gctl`.

    ## Install

    See the [installation instructions](https://github.com/gravitee-io/gravitee-cli#install) for the curl one-liner and manual options.

    For a manual install, download the archive for your platform from the **Assets** below, extract it, and move `gctl` (and optionally `gctl-ro`) into a directory on your `PATH`. Run `gctl version` to verify.
