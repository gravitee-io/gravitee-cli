version: 2

project_name: gio

builds:
  - id: gio
    binary: gio
    main: .
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: gio
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files: [LICENSE.txt, README.md]

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
    - title: Other changes
      order: 999
  filters:
    exclude: ['^docs', '^chore', '^test', '^ci', '^style', '^refactor']

release:
  header: |
    ## gio {{ .Tag }}

    gio is the Gravitee CLI for APIM & AM.
  footer: |
    ## Install

    ### Linux / macOS

    **1. Identify your platform.** Run `uname -sm` in a terminal and match the output:

    | `uname -sm` output | Archive to download                          |
    |--------------------|----------------------------------------------|
    | `Darwin arm64`     | [`gio_{{ .Version }}_darwin_arm64.tar.gz`](https://github.com/gravitee-io-labs/gio-cli/releases/download/{{ .Tag }}/gio_{{ .Version }}_darwin_arm64.tar.gz) (Mac Apple Silicon, M1/M2/...) |
    | `Darwin x86_64`    | [`gio_{{ .Version }}_darwin_amd64.tar.gz`](https://github.com/gravitee-io-labs/gio-cli/releases/download/{{ .Tag }}/gio_{{ .Version }}_darwin_amd64.tar.gz) (Mac Intel) |
    | `Linux x86_64`     | [`gio_{{ .Version }}_linux_amd64.tar.gz`](https://github.com/gravitee-io-labs/gio-cli/releases/download/{{ .Tag }}/gio_{{ .Version }}_linux_amd64.tar.gz) (most PCs and servers) |
    | `Linux aarch64`    | [`gio_{{ .Version }}_linux_arm64.tar.gz`](https://github.com/gravitee-io-labs/gio-cli/releases/download/{{ .Tag }}/gio_{{ .Version }}_linux_arm64.tar.gz) (Raspberry Pi 4+, Graviton, ...) |

    **2. Download and extract** (replace `linux_amd64` with your archive):

    ```bash
    curl -LO https://github.com/gravitee-io-labs/gio-cli/releases/download/{{ .Tag }}/gio_{{ .Version }}_linux_amd64.tar.gz
    tar -xzf gio_{{ .Version }}_linux_amd64.tar.gz
    ./gio version
    ```

    Move the resulting `gio` binary to a directory in your `PATH` to use it from anywhere.

    ### Windows

    1. Download [`gio_{{ .Version }}_windows_amd64.zip`](https://github.com/gravitee-io-labs/gio-cli/releases/download/{{ .Tag }}/gio_{{ .Version }}_windows_amd64.zip)
    2. Unzip it into a folder of your choice (e.g. `C:\Tools\gio`)
    3. Add that folder to your `PATH` so `gio` works from any terminal (run once in PowerShell):

       ```powershell
       $target = "C:\Tools\gio"
       $userPath = [Environment]::GetEnvironmentVariable("PATH", "User")
       if (-not ($userPath -split ";" -contains $target)) {
           [Environment]::SetEnvironmentVariable("PATH", "$userPath;$target", "User")
       }
       ```

    4. Open a new terminal and verify:

       ```powershell
       gio version
       ```
