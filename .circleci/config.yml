version: 2.1

orbs:
  go: circleci/go@3.0.3
  keeper: gravitee-io/keeper@0.7.0

parameters:
  go-version:
    # Keep in sync with the go directive in go.mod.
    type: string
    default: "1.26.4"

jobs:
  job-install-go-tools:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - run:
          name: Download go modules
          command: go mod download
      - run:
          name: Install Go tools
          command: make install-tools
      - go/save-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/save-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - save_cache:
          key: gotools-{{ checksum "/tmp/gomod_checksum.md5" }}
          paths:
            - bin

  job-lint-sources:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-golangci-lint-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Lint sources
          command: make lint-sources
      - go/save-golangci-lint-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'

  job-lint-licenses:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Lint licenses
          command: make lint-licenses

  job-unit-test:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - run:
          name: Run unit tests with coverage
          command: make test-cover
      - store_artifacts:
          path: cover.out
          destination: coverage/cover.out
      - go/save-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
  job-release-dry-run:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Install Go tools
          command: make install-tools
      - run:
          name: Snapshot release
          command: bin/goreleaser release --snapshot --clean --skip=publish
      - store_artifacts:
          path: dist
          destination: snapshot

  job-e2e:
    machine:
      image: ubuntu-2204:2024.01.2
      docker_layer_caching: true
    resource_class: medium
    steps:
      - checkout
      - go/install:
          version: "<< pipeline.parameters.go-version >>"
      - run:
          name: Start services
          working_directory: e2e
          command: docker compose up -d --wait --wait-timeout 180
      - run:
          name: Run E2E tests
          command: make test-e2e
      - run:
          name: Show logs on failure
          working_directory: e2e
          when: on_fail
          command: docker compose logs
      - run:
          name: Stop services
          working_directory: e2e
          when: always
          command: docker compose down -v

  job-release:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Install Go tools
          command: make install-tools
      - keeper/env-export:
          secret-url: keeper://TIlcGPFq4rN5GvgnZb9hng/field/password
          var-name: GITHUB_TOKEN
      - keeper/env-export:
          secret-url: keeper://TIlcGPFq4rN5GvgnZb9hng/field/password
          var-name: HOMEBREW_TAP_TOKEN
      - run:
          name: Release
          command: bin/goreleaser release --clean

workflows:
  ci:
    when:
      not: << pipeline.git.tag >>
    jobs:
      - job-install-go-tools:
          name: Install Go tools
      - job-lint-sources:
          name: Lint sources
          requires:
            - Install Go tools
      - job-lint-licenses:
          name: Lint licenses
          requires:
            - Install Go tools
      - job-unit-test:
          name: Run unit tests
          requires:
            - Install Go tools
      - job-e2e:
          name: Run E2E tests
      - job-release-dry-run:
          name: Release dry run
          requires:
            - Lint sources
            - Lint licenses
            - Run unit tests
          filters:
            branches:
              only: main
  release:
    when:
      matches:
        pattern: "^v.*"
        value: << pipeline.git.tag >>
    jobs:
      - job-release:
          name: Release
          context: cicd-orchestrator
          filters:
            tags:
              only: /^v.*/
