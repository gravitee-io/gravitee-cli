version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - cyclop
    - errcheck
    - errorlint
    - funlen
    - gocognit
    - godot
    - gosec
    - govet
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace
  settings:
    cyclop:
      max-complexity: 20
    gosec:
      # G704: SSRF taint analysis. This CLI legitimately calls user-supplied
      # API endpoints everywhere (oidctest, login, ...), so the check is noise.
      excludes:
        - G704
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 80
      statements: 50
    gocognit:
      min-complexity: 20
    govet:
      disable:
        - fieldalignment
      enable-all: true
    revive:
      rules:
        - name: var-naming
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - funlen
          - gocognit
          - gosec
        path: _test\.go
      # ST1005: this CLI uses multi-line errors with actionable hints on purpose.
      - linters:
          - staticcheck
        text: ST1005
    paths:
      - dist
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - dist
      - third_party$
      - builtin$
      - examples$
